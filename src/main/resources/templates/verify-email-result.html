<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Email Verification</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f6f8; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; width: 100%; text-align: center; }
        .success { color: #28a745; }
        .error { color: #dc3545; }
        .icon { font-size: 3rem; margin-bottom: 1rem; }
        h1 { margin-top: 0; font-size: 1.5rem; color: #333; }
        p { color: #555; line-height: 1.5; margin-bottom: 1.5rem; }
    </style>
</head>
<body>
    <div class="card">
        <div th:if="${success}">
            <div class="icon success">✓</div>
            <h1>Success</h1>
        </div>
        <div th:unless="${success}">
            <div class="icon error">✗</div>
            <h1>Verification Failed</h1>
        </div>
        <p th:text="${message}">Message</p>
    </div>
</body>
</html>
