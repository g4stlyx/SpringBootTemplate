#! Production profile — applied when SPRING_PROFILES_ACTIVE=prod
#! This file *overrides* properties from application.properties for production.

#! ── Swagger / OpenAPI ────────────────────────────────────────────────────────
#! Disable API docs and Swagger UI in production so attackers cannot
#! enumerate endpoints, request shapes, or response schemas.
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false
