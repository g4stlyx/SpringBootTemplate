# ==================================================
# Test Configuration - H2 In-Memory Database
# Used by @DataJpaTest
# ==================================================

spring.datasource.url=jdbc:h2:mem:testdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE;NON_KEYWORDS=USER
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

# Override MySQL dialect from main application.properties
spring.jpa.database-platform=org.hibernate.dialect.H2Dialect
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.H2Dialect
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.generate-ddl=true

# Disable batch inserts — not needed in tests, avoids H2 ordering warnings
spring.jpa.properties.hibernate.jdbc.batch_size=0
spring.jpa.properties.hibernate.order_inserts=false
spring.jpa.properties.hibernate.order_updates=false

# ==================================================
# Stub values for required properties with no defaults
# These satisfy @Value injection in @SpringBootTest context loads
# ==================================================

# Cloudflare R2 (no defaults in application.properties)
cloudflare.r2.access-key=test-access-key
cloudflare.r2.secret-key=test-secret-key
cloudflare.r2.account-id=test-account-id
cloudflare.r2.bucket-name=test-bucket
cloudflare.r2.public-domain=https://test.r2.dev

# Mail (no defaults in application.properties)
spring.mail.username=test@test.com
spring.mail.password=test-password

# reCAPTCHA (no defaults in application.properties)
recaptcha.site-key=test-site-key
recaptcha.secret-key=test-secret-key
