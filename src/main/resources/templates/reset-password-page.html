<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Reset Password</title>
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; background-color: #f4f6f8; }
        .card { background: white; padding: 2rem; border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.1); max-width: 400px; width: 100%; box-sizing: border-box; }
        h1 { margin-top: 0; font-size: 1.5rem; color: #333; text-align: center; margin-bottom: 1.5rem; }
        .form-group { margin-bottom: 1rem; }
        label { display: block; margin-bottom: 0.5rem; color: #555; font-weight: 500; font-size: 0.9rem; }
        input[type="password"] { width: 100%; padding: 0.75rem; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 1rem; }
        input[type="password"]:focus { outline: none; border-color: #007bff; box-shadow: 0 0 0 2px rgba(0,123,255,0.25); }
        button { width: 100%; padding: 0.75rem; background-color: #007bff; border: none; border-radius: 4px; color: white; font-size: 1rem; cursor: pointer; font-weight: 600; transition: background-color 0.2s; }
        button:hover { background-color: #0056b3; }
        button:disabled { background-color: #a0cbfc; cursor: not-allowed; }
        .message { margin-top: 1rem; padding: 0.75rem; border-radius: 4px; text-align: center; display: none; font-size: 0.9rem; }
        .message.success { background-color: #d4edda; color: #155724; border: 1px solid #c3e6cb; display: block; }
        .message.error { background-color: #f8d7da; color: #721c24; border: 1px solid #f5c6cb; display: block; }
    </style>
</head>
<body>
    <div class="card" id="formCard">
        <h1>Reset Password</h1>
        <form id="resetForm">
            <input type="hidden" id="token" th:value="${token}">
            
            <div class="form-group">
                <label for="newPassword">New Password</label>
                <input type="password" id="newPassword" required minlength="8">
            </div>
            
            <div class="form-group">
                <label for="confirmPassword">Confirm Password</label>
                <input type="password" id="confirmPassword" required minlength="8">
            </div>
            
            <button type="submit" id="submitBtn">Reset Password</button>
        </form>
        <div id="statusMessage" class="message"></div>
    </div>

    <script>
        document.getElementById('resetForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const token = document.getElementById('token').value;
            const newPassword = document.getElementById('newPassword').value;
            const confirmPassword = document.getElementById('confirmPassword').value;
            const messageDiv = document.getElementById('statusMessage');
            const submitBtn = document.getElementById('submitBtn');
            
            // Reset message
            messageDiv.className = 'message';
            messageDiv.textContent = '';
            
            if (newPassword !== confirmPassword) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'Passwords do not match.';
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = 'Resetting...';
            
            try {
                const response = await fetch('/api/v1/auth/reset-password', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json'
                    },
                    body: JSON.stringify({
                        token: token,
                        newPassword: newPassword
                    })
                });
                
                const data = await response.json();
                
                if (response.ok && data.success) {
                    messageDiv.className = 'message success';
                    messageDiv.textContent = data.message || 'Password has been reset successfully. You can now login.';
                    document.getElementById('resetForm').style.display = 'none';
                } else {
                    messageDiv.className = 'message error';
                    messageDiv.textContent = data.message || data.error || 'Failed to reset password. Token might be invalid or expired.';
                }
            } catch (error) {
                messageDiv.className = 'message error';
                messageDiv.textContent = 'An error occurred. Please try again.';
            } finally {
                if (document.getElementById('resetForm').style.display !== 'none') {
                    submitBtn.disabled = false;
                    submitBtn.textContent = 'Reset Password';
                }
            }
        });
    </script>
</body>
</html>
